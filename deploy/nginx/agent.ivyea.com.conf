# agent.ivyea.com — Ivyea Agent documentation portal (static).
# Same deployment style as ivyea.com: static files on the origin server.
#
# Deploy files:
#   mkdir -p /var/www/agent.ivyea.com
#   cp -a site/. /var/www/agent.ivyea.com/
#
# Enable HTTP first:
#   cp deploy/nginx/agent.ivyea.com.conf /etc/nginx/conf.d/
#   nginx -t && systemctl reload nginx
#
# After DNS points agent.ivyea.com to this server:
#   certbot --nginx -d agent.ivyea.com

server {
    listen 80;
    listen [::]:80;
    server_name agent.ivyea.com;

    root /var/www/agent.ivyea.com;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/agent.ivyea.com;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
